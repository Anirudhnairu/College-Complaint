<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1>
            Administrator Dashboard
        </h1>

        <div>

            <a href="/staff"
               class="btn btn-primary">

                Staff Dashboard

            </a>

            <a href="/dashboard"
               class="btn btn-secondary">

                Student Dashboard

            </a>

        </div>

    </div>

    <div class="card">

        <div class="card-header">

            <h4>
                All Complaints
            </h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% for complaint in complaints %}

                    <tr>

                        <form action="/update-complaint/{{ complaint.id }}"
                              method="POST">

                            <td>{{ complaint.id }}</td>

                            <td>{{ complaint.title }}</td>

                            <td>{{ complaint.category }}</td>

                            <td>

                                <select name="status"
                                        class="form-select">

                                    <option value="Pending">Pending</option>

                                    <option value="In Progress">
                                        In Progress
                                    </option>

                                    <option value="Resolved">
                                        Resolved
                                    </option>

                                </select>

                            </td>

                            <td>

                                <input
                                    type="text"
                                    name="assigned_to"
                                    class="form-control"
                                    value="{{ complaint.assigned_to }}">

                            </td>

                            <td>

                                <button
                                    class="btn btn-success">

                                    Update

                                </button>

                            </td>

                        </form>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
