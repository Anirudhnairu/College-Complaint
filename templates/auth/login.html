<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        College Complaint Management System
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            padding:30px;
            border-radius:15px;
            background:white;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="title">

        <h3>
            College Complaint Management System
        </h3>

        <p class="text-muted">
            Student Login
        </p>

    </div>

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            Login

        </button>

    </form>

    <div class="text-center mt-3">

        <p>
            Don't have an account?
        </p>

        <a href="/register"
           class="btn btn-outline-primary">

            Register Here

        </a>

    </div>

</div>

</body>

</html>
