<!DOCTYPE html>
<html>

<head>

    <title>Staff Resolution Interface</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Staff Resolution Interface
    </h1>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Assigned To</th>
                <th>Remarks</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody>

            {% for complaint in complaints %}

            <tr>

                <form action="/resolve/{{ complaint.id }}"
                      method="POST">

                    <td>{{ complaint.id }}</td>

                    <td>{{ complaint.title }}</td>

                    <td>{{ complaint.status }}</td>

                    <td>{{ complaint.assigned_to }}</td>

                    <td>

                        <input
                            type="text"
                            name="remarks"
                            class="form-control">

                    </td>

                    <td>

                        <button
                            class="btn btn-success">

                            Resolve

                        </button>

                    </td>

                </form>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
